
services:
  frpcmgrd:
    image: ghcr.io/mia-clark/frpc-manager:${FRPMGR_IMAGE_TAG:-latest}
    container_name: docker_frpcmgrd
    restart: always
    network_mode: host
    environment:
      # --- required ---
      FRPMGR_API_TOKEN: ${FRPMGR_API_TOKEN:-admin@local}

      # --- optional ---
      FRPMGR_HTTP_ADDR: ":${FRPMGR_HTTP_PORT:-17200}"
      FRPMGR_CORS_ORIGINS: ${FRPMGR_CORS_ORIGINS:-*}
      FRPMGR_LOG_LEVEL: ${FRPMGR_LOG_LEVEL:-info}
      FRPMGR_DOCS_ENABLED: ${FRPMGR_DOCS_ENABLED:-true}
      TZ: ${TZ:-UTC}

    volumes:
      - ./frpmgr-data:/data
      # - ${FRPMGR_DATA_DIR:-./data}:/data

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # ------------------------------------------------------------------
    # Resource hints. Comment out if you don't use compose v2 deploy
    # constraints. Defaults are generous; the daemon idles at ~30 MB.
    # ------------------------------------------------------------------
    deploy:
      resources:
        limits:
          memory: ${FRPMGR_MEMORY_LIMIT:-512M}
        reservations:
          memory: 64M

    # ------------------------------------------------------------------
    # Optional: opt-in to Watchtower for unattended image updates.
    # https://containrrr.dev/watchtower/
    # ------------------------------------------------------------------
    labels:
      com.centurylinklabs.watchtower.enable: "${FRPMGR_AUTOUPDATE:-false}"



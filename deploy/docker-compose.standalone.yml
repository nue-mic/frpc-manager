
services:
  frpcmgrd:
    image: ghcr.io/nue-mic/frpc-manager:${FRPCMGR_IMAGE_TAG:-latest}
    container_name: docker_frpcmgrd
    restart: always
    network_mode: host
    environment:
      # --- required ---
      FRPCMGR_API_TOKEN: ${FRPCMGR_API_TOKEN:-admin@local}

      # --- optional ---
      FRPCMGR_HTTP_ADDR: ":${FRPCMGR_HTTP_PORT:-17200}"
      FRPCMGR_CORS_ORIGINS: ${FRPCMGR_CORS_ORIGINS:-*}
      FRPCMGR_LOG_LEVEL: ${FRPCMGR_LOG_LEVEL:-info}
      FRPCMGR_DOCS_ENABLED: ${FRPCMGR_DOCS_ENABLED:-true}
      TZ: ${TZ:-UTC}

    volumes:
      - ./frpmgr-data:/data
      # - ${FRPCMGR_DATA_DIR:-./data}:/data

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # ------------------------------------------------------------------
    # Resource hints. Comment out if you don't use compose v2 deploy
    # constraints. Defaults are generous; the daemon idles at ~30 MB.
    # ------------------------------------------------------------------
    deploy:
      resources:
        limits:
          memory: ${FRPCMGR_MEMORY_LIMIT:-512M}
        reservations:
          memory: 64M

    # ------------------------------------------------------------------
    # Optional: opt-in to Watchtower for unattended image updates.
    # https://containrrr.dev/watchtower/
    # ------------------------------------------------------------------
    labels:
      com.centurylinklabs.watchtower.enable: "${FRPCMGR_AUTOUPDATE:-false}"



# ============================================================================
# 本地源码构建专用 compose 文件
#
#   docker compose -f deploy/docker-compose.yml up --build -d
#
# Dockerfile 内置 node:20 + go 多阶段构建 — npm install/build 都在镜像内完成，
# 宿主机无需 Node 环境，也不用先跑任何 npm 命令。
# ============================================================================

services:
  frpcmgrd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: frpmgr-server:${VERSION:-dev}
    container_name: frpcmgrd
    restart: unless-stopped
    # host network is recommended for frpc so that xtcp / NAT hole
    # punching works correctly. Switch to bridge if you only need plain
    # tcp/http proxies and want stricter isolation.
    network_mode: host
    environment:
      FRPCMGR_API_TOKEN: ${FRPCMGR_API_TOKEN:?api token required (set in .env)}
      FRPCMGR_HTTP_ADDR: ":${FRPCMGR_HTTP_PORT:-8080}"
      FRPCMGR_CORS_ORIGINS: ${FRPCMGR_CORS_ORIGINS:-*}
      FRPCMGR_LOG_LEVEL: ${FRPCMGR_LOG_LEVEL:-info}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/usr/local/bin/frpcmgrd", "health", "-addr", "http://127.0.0.1:${FRPCMGR_HTTP_PORT:-8080}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
